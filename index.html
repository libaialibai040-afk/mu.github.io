<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美术生课堂小游戏 - 颜料大师</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f8f5f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 游戏容器 */
        .game-container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
        }

        /* 标题样式 */
        .game-title {
            font-size: 28px;
            color: #6d4c41;
            margin-bottom: 10px;
            border-bottom: 2px dashed #d7ccc8;
            padding-bottom: 15px;
        }

        .game-subtitle {
            color: #8d6e63;
            margin-bottom: 25px;
        }

        /* 游戏状态面板 */
        .game-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 10px 15px;
            background: #efebe9;
            border-radius: 10px;
        }

        .info-item {
            font-size: 16px;
            color: #5d4037;
            font-weight: bold;
        }

        /* 关卡容器 */
        .level-container {
            min-height: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        /* 按钮通用样式 */
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }

        .start-btn {
            background: #8d6e63;
            color: white;
        }

        .start-btn:hover {
            background: #6d4c41;
        }

        .color-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }

        .color-btn:hover {
            transform: scale(1.1);
        }

        .brush-item {
            width: 80px;
            height: 100px;
            background: #fff;
            border: 2px solid #d7ccc8;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .brush-item:hover {
            border-color: #8d6e63;
            background: #f1f1f1;
        }

        .paint-box {
            width: 70px;
            height: 70px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .options-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 结果提示 */
        .result-text {
            font-size: 20px;
            font-weight: bold;
            margin: 15px 0;
        }

        .correct {
            color: #388e3c;
        }

        .wrong {
            color: #d32f2f;
        }

        /* 隐藏类 */
        .hidden {
            display: none !important;
        }

        /* 目标颜色展示 */
        .target-color {
            width: 120px;
            height: 120px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1 class="game-title">🎨 美术生课堂 - 颜料大师</h1>
        <p class="game-subtitle">工艺品美术生专属轻量小游戏 | 3个趣味关卡等你来挑战</p>

        <!-- 游戏信息栏 -->
        <div class="game-info">
            <div class="info-item">关卡：<span id="level">0</span></div>
            <div class="info-item">得分：<span id="score">0</span></div>
            <div class="info-item">时间：<span id="time">0</span>s</div>
        </div>

        <!-- 游戏主区域 -->
        <div class="level-container" id="gameContent">
            <p>欢迎来到美术生课堂小游戏！<br>点击开始按钮，挑战你的色彩与工具感知力</p>
            <button class="btn start-btn" id="startBtn">开始游戏</button>
        </div>
    </div>

    <script>
        // 游戏核心数据
        const gameData = {
            currentLevel: 0,
            score: 0,
            time: 0,
            timer: null,
            levels: [
                // 关卡1：调色大师 - 匹配目标颜色
                {
                    name: "调色大师",
                    desc: "选择和目标颜色一致的颜料",
                    targetColor: "#ff6b6b",
                    options: ["#ff6b6b", "#4ecdc4", "#45b7d1", "#feca57"]
                },
                // 关卡2：画笔速选 - 美术生正确画笔选择
                {
                    name: "画笔速选",
                    desc: "点击【水彩画笔】完成挑战",
                    correctBrush: "水彩画笔",
                    brushes: ["铅笔", "水彩画笔", "油画笔", "勾线笔"]
                },
                // 关卡3：颜料收纳 - 按色系归类颜料
                {
                    name: "颜料收纳",
                    desc: "点击【红色系颜料】放入收纳盒",
                    correctPaint: "#e74c3c",
                    paints: ["#2ecc71", "#3498db", "#e74c3c", "#f1c40f"]
                }
            ]
        };

        // DOM元素
        const startBtn = document.getElementById('startBtn');
        const gameContent = document.getElementById('gameContent');
        const levelText = document.getElementById('level');
        const scoreText = document.getElementById('score');
        const timeText = document.getElementById('time');

        // 开始游戏
        startBtn.addEventListener('click', startGame);

        function startGame() {
            gameData.currentLevel = 1;
            gameData.score = 0;
            gameData.time = 0;
            updateGameInfo();
            startTimer();
            loadLevel();
        }

        // 计时器
        function startTimer() {
            clearInterval(gameData.timer);
            gameData.timer = setInterval(() => {
                gameData.time++;
                timeText.textContent = gameData.time;
            }, 1000);
        }

        // 更新游戏信息
        function updateGameInfo() {
            levelText.textContent = gameData.currentLevel;
            scoreText.textContent = gameData.score;
            timeText.textContent = gameData.time;
        }

        // 加载当前关卡
        function loadLevel() {
            const level = gameData.levels[gameData.currentLevel - 1];
            gameContent.innerHTML = "";

            // 关卡标题
            const title = document.createElement('h2');
            title.textContent = `第${gameData.currentLevel}关：${level.name}`;
            gameContent.appendChild(title);

            // 关卡描述
            const desc = document.createElement('p');
            desc.style.fontSize = '18px';
            desc.style.color = '#555';
            desc.textContent = level.desc;
            gameContent.appendChild(desc);

            // 加载对应关卡
            if(gameData.currentLevel === 1) loadLevel1();
            if(gameData.currentLevel === 2) loadLevel2();
            if(gameData.currentLevel === 3) loadLevel3();
        }

        // 关卡1：调色匹配
        function loadLevel1() {
            const level = gameData.levels[0];
            
            // 目标颜色
            const target = document.createElement('div');
            target.className = 'target-color';
            target.style.background = level.targetColor;
            gameContent.appendChild(target);

            // 颜色选项
            const options = document.createElement('div');
            options.className = 'options-row';
            
            level.options.forEach(color => {
                const btn = document.createElement('button');
                btn.className = 'color-btn';
                btn.style.background = color;
                btn.addEventListener('click', () => checkAnswer1(color));
                options.appendChild(btn);
            });

            gameContent.appendChild(options);
        }

        // 关卡1答案校验
        function checkAnswer1(color) {
            const level = gameData.levels[0];
            if(color === level.targetColor) {
                gameData.score += 50;
                showResult(true);
            } else {
                showResult(false);
            }
        }

        // 关卡2：画笔选择
        function loadLevel2() {
            const level = gameData.levels[1];
            const options = document.createElement('div');
            options.className = 'options-row';
            
            level.brushes.forEach(brush => {
                const item = document.createElement('div');
                item.className = 'brush-item';
                item.innerHTML = `<span>${brush}</span>`;
                item.addEventListener('click', () => checkAnswer2(brush));
                options.appendChild(item);
            });

            gameContent.appendChild(options);
        }

        // 关卡2答案校验
        function checkAnswer2(brush) {
            const level = gameData.levels[1];
            if(brush === level.correctBrush) {
                gameData.score += 60;
                showResult(true);
            } else {
                showResult(false);
            }
        }

        // 关卡3：颜料收纳
        function loadLevel3() {
            const level = gameData.levels[2];
            const options = document.createElement('div');
            options.className = 'options-row';
            
            level.paints.forEach(color => {
                const box = document.createElement('div');
                box.className = 'paint-box';
                box.style.background = color;
                box.addEventListener('click', () => checkAnswer3(color));
                options.appendChild(box);
            });

            gameContent.appendChild(options);
        }

        // 关卡3答案校验
        function checkAnswer3(color) {
            const level = gameData.levels[2];
            if(color === level.correctPaint) {
                gameData.score += 70;
                showResult(true);
            } else {
                showResult(false);
            }
        }

        // 显示结果并进入下一关/结束游戏
        function showResult(isCorrect) {
            // 清空内容
            gameContent.innerHTML = "";
            const result = document.createElement('div');
            result.className = 'result-text ' + (isCorrect ? 'correct' : 'wrong');
            
            if(isCorrect) {
                result.textContent = "✅ 回答正确！";
                updateGameInfo();
                
                // 下一关 or 游戏结束
                if(gameData.currentLevel < gameData.levels.length) {
                    const nextBtn = document.createElement('button');
                    nextBtn.className = 'btn start-btn';
                    nextBtn.textContent = '进入下一关';
                    nextBtn.addEventListener('click', () => {
                        gameData.currentLevel++;
                        updateGameInfo();
                        loadLevel();
                    });
                    gameContent.appendChild(nextBtn);
                } else {
                    endGame();
                }
            } else {
                result.textContent = "❌ 答错了，再试一次！";
                const retryBtn = document.createElement('button');
                retryBtn.className = 'btn start-btn';
                retryBtn.textContent = '重新挑战本关';
                retryBtn.addEventListener('click', loadLevel);
                gameContent.appendChild(retryBtn);
            }
            
            gameContent.appendChild(result);
        }

        // 游戏结束
        function endGame() {
            clearInterval(gameData.timer);
            gameContent.innerHTML = `
                <h2 style="color:#6d4c41">🎉 恭喜通关！</h2>
                <p style="font-size:18px;margin:15px 0">你完成了所有美术生课堂挑战！</p>
                <p style="font-size:20px;font-weight:bold;color:#8d6e63">
                    最终得分：${gameData.score} 分<br>
                    用时：${gameData.time} 秒
                </p>
                <button class="btn start-btn" onclick="startGame()">再来一局</button>
            `;
        }
    </script>
</body>
</html>
