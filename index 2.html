<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>手机触屏贪吃蛇</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#111;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  overflow:hidden;
}
#score{
  color:#fff;
  font-size:22px;
  margin-bottom:10px;
}
#gameCanvas{
  border:2px solid #4cd964;
  background:#000;
}
.tip{
  color:#888;
  font-size:14px;
  margin-top:10px;
}
</style>
</head>
<body>
<div id="score">得分：0</div>
<canvas id="gameCanvas"></canvas>
<div class="tip">手指上下左右滑动控制</div>

<script>
// 适配手机屏幕
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let w = Math.min(window.innerWidth - 20, 360);
let h = w;
canvas.width = w;
canvas.height = h;

const grid = 18;
let snake = [{x:10,y:10}];
let dx = 0, dy = 0;
let food = {x:15,y:15};
let score = 0;
let scoreDom = document.getElementById('score');
let gameTimer;

// 触屏滑动变量
let startX = 0, startY = 0;

// 开始游戏
start();

function start(){
  createFood();
  gameTimer = setInterval(draw,120);
}

// 绘制
function draw(){
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // 蛇头前进
  let head = {x:snake[0].x+dx, y:snake[0].y+dy};
  snake.unshift(head);

  // 吃食物
  if(head.x===food.x && head.y===food.y){
    score += 10;
    scoreDom.innerText = "得分："+score;
    createFood();
  }else{
    snake.pop();
  }

  // 撞墙撞自己
  if(checkDead()){
    clearInterval(gameTimer);
    alert("游戏结束！得分："+score+"\n确定重新开始");
    location.reload();
  }

  // 画食物
  ctx.fillStyle="#ff3b30";
  ctx.fillRect(food.x*grid, food.y*grid, grid-2, grid-2);

  // 画蛇
  snake.forEach((item,i)=>{
    ctx.fillStyle = i===0 ? "#4cd964" : "#34c759";
    ctx.fillRect(item.x*grid, item.y*grid, grid-2, grid-2);
  });
}

// 生成食物
function createFood(){
  let max = Math.floor(canvas.width/grid);
  food.x = Math.floor(Math.random()*max);
  food.y = Math.floor(Math.random()*max);
}

// 死亡判断
function checkDead(){
  let max = Math.floor(canvas.width/grid);
  if(snake[0].x<0 || snake[0].x>=max || snake[0].y<0 || snake[0].y>=max) return true;
  for(let i=1;i<snake.length;i++){
    if(snake[i].x===snake[0].x && snake[i].y===snake[0].y) return true;
  }
  return false;
}

// 触屏滑动控制
canvas.addEventListener('touchstart',e=>{
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  let endX = e.touches[0].clientX;
  let endY = e.touches[0].clientY;
  let disX = endX - startX;
  let disY = endY - startY;

  if(Math.abs(disX) > Math.abs(disY)){
    // 左右滑
    if(disX>20 && dx!==-1){dx=1;dy=0;}
    else if(disX<-20 && dx!==1){dx=-1;dy=0;}
  }else{
    // 上下滑
    if(disY>20 && dy!==-1){dx=0;dy=1;}
    else if(disY<-20 && dy!==1){dx=0;dy=-1;}
  }
});
</script>
</body>
</html>
